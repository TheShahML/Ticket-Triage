<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Triage Embeddings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 10% 10%, #f5f7fb 0%, #eef2f6 40%, #e8edf3 100%);
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-900">
    <main class="mx-auto max-w-5xl px-4 py-8 sm:px-6 lg:px-8">
      <section class="mb-8 rounded-3xl border border-slate-200 bg-white/90 p-6 shadow-sm backdrop-blur">
        <h1 class="text-3xl font-semibold tracking-tight">Ticket Triage Embeddings</h1>
        <p class="mt-2 text-sm text-slate-600">Simple, explainable support triage using embeddings + nearest neighbors.</p>
      </section>

      <section class="grid gap-6 lg:grid-cols-5">
        <div class="lg:col-span-3 rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
          <div class="mb-3 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
            <label class="text-sm font-medium text-slate-700">Ticket Text</label>
            <div class="min-w-0 sm:w-3/4">
              <select
                id="exampleSelect"
                class="block w-full min-w-0 truncate rounded-lg border border-slate-300 px-3 py-2 text-sm"
              >
                <option value="">Load Example</option>
              </select>
            </div>
          </div>
          <textarea
            id="ticketInput"
            class="h-48 w-full min-w-0 rounded-xl border border-slate-300 p-3 text-sm focus:border-slate-500 focus:outline-none"
            placeholder="Paste a customer support ticket here..."
          ></textarea>
          <div class="mt-4 flex flex-wrap gap-3">
            <button id="triageBtn" class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">
              Triage
            </button>
            <button id="draftBtn" class="hidden rounded-xl bg-emerald-700 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-600">
              Draft Reply (LLM)
            </button>
          </div>
          <p id="status" class="mt-3 text-sm text-slate-500"></p>
        </div>

        <div class="lg:col-span-2 rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500">Prediction</h2>
          <div class="mt-4 space-y-3 text-sm">
            <div><span class="font-medium">Category:</span> <span id="category">-</span></div>
            <div><span class="font-medium">Priority:</span> <span id="priority">-</span></div>
            <div><span class="font-medium">Confidence:</span> <span id="confidence">-</span></div>
            <div><span class="font-medium">Reasoning:</span> <span id="reasoning" class="text-slate-600">-</span></div>
          </div>
        </div>
      </section>

      <section class="mt-6 grid gap-6 lg:grid-cols-2">
        <details class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm" open>
          <summary class="cursor-pointer text-sm font-semibold">Similar Past Tickets</summary>
          <ul id="examplesList" class="mt-3 space-y-3 text-sm text-slate-700"></ul>
        </details>

        <details class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm" open>
          <summary class="cursor-pointer text-sm font-semibold">KB Context</summary>
          <ul id="kbList" class="mt-3 space-y-3 text-sm text-slate-700"></ul>
        </details>
      </section>

      <section class="mt-6 grid gap-6 lg:grid-cols-2">
        <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
          <h3 class="text-sm font-semibold">Recommended Next Steps</h3>
          <ol id="stepsList" class="mt-3 list-decimal space-y-2 pl-5 text-sm text-slate-700"></ol>
        </div>
        <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
          <div class="flex items-center justify-between gap-3">
            <h3 class="text-sm font-semibold">Drafted Reply</h3>
            <button
              id="copyReplyBtn"
              class="rounded-lg border border-slate-300 px-3 py-1 text-xs font-medium text-slate-700 hover:bg-slate-50"
              type="button"
            >
              Copy
            </button>
          </div>
          <pre id="reply" class="mt-3 whitespace-pre-wrap text-sm text-slate-700"></pre>
        </div>
      </section>
    </main>

    <script>
      const ticketInput = document.getElementById("ticketInput");
      const statusEl = document.getElementById("status");
      const draftBtn = document.getElementById("draftBtn");
      const exampleSelect = document.getElementById("exampleSelect");
      const copyReplyBtn = document.getElementById("copyReplyBtn");

      async function loadHealth() {
        const res = await fetch("/health");
        const data = await res.json();
        if (data.llm_enabled) draftBtn.classList.remove("hidden");
        data.example_tickets.forEach((text) => {
          const option = document.createElement("option");
          option.value = text;
          option.textContent = text.slice(0, 70);
          exampleSelect.appendChild(option);
        });
      }

      function renderList(elementId, rows, formatter) {
        const root = document.getElementById(elementId);
        root.innerHTML = "";
        rows.forEach((row) => {
          const li = document.createElement("li");
          li.className = "rounded-xl border border-slate-200 p-3";
          li.innerHTML = formatter(row);
          root.appendChild(li);
        });
      }

      async function triage() {
        const text = ticketInput.value.trim();
        if (!text) {
          statusEl.textContent = "Enter a ticket first.";
          return;
        }
        statusEl.textContent = "Running triage...";
        const res = await fetch("/triage", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, top_k: 5 }),
        });
        const data = await res.json();

        document.getElementById("category").textContent = data.category;
        document.getElementById("priority").textContent = data.priority;
        document.getElementById("confidence").textContent = data.confidence;
        document.getElementById("reasoning").textContent = data.reasoning;

        renderList("examplesList", data.similar_examples, (x) =>
          `<div class='font-medium'>${x.label} (${x.score})</div><div>${x.text}</div>`
        );

        renderList("kbList", data.kb_context, (x) =>
          `<div class='font-medium'>${x.title} (${x.score})</div><div>${x.snippet}</div>`
        );

        renderList("stepsList", data.next_steps, (x) => `<div>${x}</div>`);
        document.getElementById("reply").textContent = data.drafted_reply;
        statusEl.textContent = "Done.";
      }

      async function draftReply() {
        const text = ticketInput.value.trim();
        if (!text) return;
        statusEl.textContent = "Generating LLM draft...";
        const res = await fetch("/draft_reply", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, kb_top_k: 5 }),
        });
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = data.detail || "Draft failed.";
          return;
        }
        document.getElementById("reply").textContent = data.drafted_reply;
        statusEl.textContent = `LLM draft ready (${data.tone}).`;
      }

      async function copyReply() {
        const text = document.getElementById("reply").textContent || "";
        if (!text.trim()) {
          statusEl.textContent = "No drafted reply to copy yet.";
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          const original = copyReplyBtn.textContent;
          copyReplyBtn.textContent = "Copied!";
          statusEl.textContent = "Drafted reply copied to clipboard.";
          setTimeout(() => {
            copyReplyBtn.textContent = original;
          }, 1200);
        } catch {
          statusEl.textContent = "Clipboard copy failed. Please copy manually.";
        }
      }

      exampleSelect.addEventListener("change", (e) => {
        if (e.target.value) ticketInput.value = e.target.value;
      });
      document.getElementById("triageBtn").addEventListener("click", triage);
      draftBtn.addEventListener("click", draftReply);
      copyReplyBtn.addEventListener("click", copyReply);
      loadHealth();
    </script>
  </body>
</html>
